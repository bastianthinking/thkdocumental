<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control Documental - Thinking SpA</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .login-page {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .login-box {
            background: #1e293b;
            padding: 40px;
            border-radius: 12px;
            border: 1px solid #334155;
            width: 100%;
            max-width: 400px;
        }

        .login-box h1 {
            margin-bottom: 10px;
            color: #f1f5f9;
            font-size: 24px;
        }

        .login-box p {
            color: #cbd5e1;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #cbd5e1;
            font-weight: 500;
            font-size: 14px;
        }

        input[type="email"],
        input[type="password"],
        input[type="text"],
        input[type="date"],
        select,
        textarea {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #334155;
            border-radius: 6px;
            background: #0f172a;
            color: #e2e8f0;
            font-size: 14px;
            font-family: inherit;
        }

        input:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.2s;
        }

        .btn-primary {
            background: #3b82f6;
            color: white;
            width: 100%;
        }

        .btn-primary:hover {
            background: #2563eb;
        }

        .btn-secondary {
            background: #475569;
            color: white;
        }

        .btn-secondary:hover {
            background: #334155;
        }

        .btn-danger {
            background: #ef4444;
            color: white;
        }

        .btn-danger:hover {
            background: #dc2626;
        }

        .btn-sm {
            padding: 6px 12px;
            font-size: 12px;
        }

        .btn-icon {
            padding: 8px 12px;
            margin-right: 8px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid #334155;
        }

        .header h1 {
            font-size: 28px;
            color: #f1f5f9;
        }

        .header-right {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .user-info {
            color: #cbd5e1;
            font-size: 14px;
        }

        .main-content {
            display: none;
        }

        .main-content.active {
            display: block;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            border-bottom: 1px solid #334155;
        }

        .tab-button {
            padding: 12px 20px;
            background: transparent;
            border: none;
            color: #cbd5e1;
            cursor: pointer;
            font-weight: 600;
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
        }

        .tab-button.active {
            color: #3b82f6;
            border-bottom-color: #3b82f6;
        }

        .tab-button:hover {
            color: #e2e8f0;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .form-section {
            background: #1e293b;
            padding: 25px;
            border-radius: 12px;
            border: 1px solid #334155;
            margin-bottom: 30px;
        }

        .form-section h2 {
            margin-bottom: 20px;
            color: #f1f5f9;
            font-size: 18px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 15px;
        }

        .form-row.full {
            grid-template-columns: 1fr;
        }

        .table-container {
            background: #1e293b;
            border-radius: 12px;
            border: 1px solid #334155;
            overflow: hidden;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            background: #0f172a;
            border-bottom: 1px solid #334155;
        }

        th {
            padding: 15px;
            text-align: left;
            font-weight: 600;
            color: #cbd5e1;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        td {
            padding: 12px 15px;
            border-bottom: 1px solid #334155;
            font-size: 14px;
        }

        tbody tr:hover {
            background: #0f172a;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            text-transform: capitalize;
        }

        .status-borrador {
            background: #92400e;
            color: #fef3c7;
        }

        .status-aprobado {
            background: #064e3b;
            color: #d1fae5;
        }

        .status-archivado {
            background: #1e3a8a;
            color: #dbeafe;
        }

        .actions {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
        }

        .audit-item {
            background: #0f172a;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 12px;
            border-left: 3px solid #3b82f6;
        }

        .audit-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
        }

        .audit-action {
            font-weight: 600;
            color: #3b82f6;
            font-size: 13px;
            text-transform: uppercase;
        }

        .audit-time {
            color: #94a3b8;
            font-size: 12px;
        }

        .audit-user {
            color: #cbd5e1;
            font-size: 13px;
            margin-bottom: 8px;
        }

        .audit-details {
            background: rgba(59, 130, 246, 0.1);
            padding: 10px;
            border-radius: 4px;
            font-size: 12px;
            color: #cbd5e1;
            font-family: 'Monaco', monospace;
            overflow-x: auto;
        }

        .message {
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .message.success {
            background: #064e3b;
            color: #d1fae5;
            border: 1px solid #047857;
        }

        .message.error {
            background: #7f1d1d;
            color: #fecaca;
            border: 1px solid #991b1b;
        }

        .message.info {
            background: #1e3a8a;
            color: #dbeafe;
            border: 1px solid #1e40af;
        }

        @media (max-width: 768px) {
            .form-row {
                grid-template-columns: 1fr;
            }

            .header {
                flex-direction: column;
                align-items: flex-start;
                gap: 15px;
            }

            .header-right {
                flex-direction: column;
                align-items: flex-start;
            }

            table {
                font-size: 12px;
            }

            th, td {
                padding: 10px;
            }
        }
    </style>
</head>
<body>
    <!-- LOGIN PAGE -->
    <div class="login-page" id="loginPage">
        <div class="login-box">
            <h1>Control Documental</h1>
            <p>Thinking SpA</p>
            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="loginEmail" required value="bastian.zuniga@thinking.cl">
                </div>
                <div class="form-group">
                    <label>Contraseña</label>
                    <input type="password" id="loginPassword" required value="thinking2024">
                </div>
                <button type="submit" class="btn-primary">Iniciar sesión</button>
                <div id="loginError" style="color: #fecaca; margin-top: 15px; text-align: center; font-size: 13px; display: none;"></div>
            </form>
        </div>
    </div>

    <!-- MAIN APP -->
    <div class="main-content" id="mainContent">
        <div class="container">
            <!-- HEADER -->
            <div class="header">
                <h1>📄 Control Documental</h1>
                <div class="header-right">
                    <div class="user-info">
                        <strong id="userEmailDisplay"></strong><br>
                        <small id="userRoleDisplay"></small>
                    </div>
                    <button class="btn-secondary btn-sm" onclick="handleLogout()">Cerrar sesión</button>
                </div>
            </div>

            <!-- TABS -->
            <div class="tabs">
                <button class="tab-button active" onclick="switchTab('documentos')">Documentos</button>
                <button class="tab-button" onclick="switchTab('auditoria')">Auditoría</button>
            </div>

            <!-- TAB: DOCUMENTOS -->
            <div class="tab-content active" id="documentos-tab">
                <!-- FORMULARIO -->
                <div class="form-section" id="formSection">
                    <h2 id="formTitle">Nuevo Documento</h2>
                    <form id="documentForm" onsubmit="handleSaveDocument(event)">
                        <div class="form-row">
                            <div class="form-group">
                                <label>Nombre del documento</label>
                                <input type="text" id="docName" required placeholder="Ej: Contrato BHP Q2 2025">
                            </div>
                            <div class="form-group">
                                <label>Tipo</label>
                                <select id="docType" required>
                                    <option value="">-- Seleccionar --</option>
                                    <option value="contrato">Contrato</option>
                                    <option value="factura">Factura</option>
                                    <option value="reporte">Reporte</option>
                                    <option value="propuesta">Propuesta</option>
                                    <option value="otro">Otro</option>
                                </select>
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label>Estado</label>
                                <select id="docStatus" required>
                                    <option value="borrador">Borrador</option>
                                    <option value="aprobado">Aprobado</option>
                                    <option value="archivado">Archivado</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>Fecha vencimiento</label>
                                <input type="date" id="docDueDate">
                            </div>
                        </div>
                        <div class="form-row full">
                            <div class="form-group">
                                <label>Link a archivo Word</label>
                                <input type="text" id="docLink" placeholder="Ej: https://docs.microsoft.com/...">
                            </div>
                        </div>
                        <div class="form-row full">
                            <div class="form-group">
                                <label>Notas</label>
                                <textarea id="docNotes" rows="3" placeholder="Notas adicionales..."></textarea>
                            </div>
                        </div>
                        <div style="display: flex; gap: 10px;">
                            <button type="submit" class="btn-primary">Guardar documento</button>
                            <button type="button" class="btn-secondary" onclick="resetForm()" id="btnCancel" style="display: none;">Cancelar</button>
                        </div>
                    </form>
                </div>

                <!-- TABLA -->
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Nombre</th>
                                <th>Tipo</th>
                                <th>Estado</th>
                                <th>Vencimiento</th>
                                <th>Link</th>
                                <th>Creado por</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="documentTable">
                            <tr>
                                <td colspan="7" style="text-align: center; padding: 30px;">Cargando documentos...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- TAB: AUDITORÍA -->
            <div class="tab-content" id="auditoria-tab">
                <div id="auditList" style="max-height: 600px; overflow-y: auto;">
                    <div style="text-align: center; padding: 30px; color: #94a3b8;">Cargando auditoría...</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // CONFIG
        const SUPABASE_URL = 'https://kmrvvbbyekzuzimzahvd.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImttcnZ2YmJ5ZWt6dXppbXphaHZkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1OTkzNDEsImV4cCI6MjA5NDE3NTM0MX0.FqmTWcjOHX1J3H-VnAXyaFpXZe1jkIf3GD9WJg0yhTA';

        // INIT SUPABASE
        const { createClient } = window.supabase;
        const supabaseClient = createClient(SUPABASE_URL, SUPABASE_KEY);

        // STATE
        let currentUser = null;
        let currentUserRole = null;
        let editingDocId = null;
        let documents = [];
        let auditLogs = [];

        // UUID GENERATOR
        function generateUUID() {
            return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
                const r = Math.random() * 16 | 0;
                const v = c === 'x' ? r : (r & 0x3 | 0x8);
                return v.toString(16);
            });
        }

        // INIT
        async function init() {
            await checkUserLogin();
            if (currentUser) {
                await loadDocuments();
                await loadAudit();
            }
        }

        // AUTH
        async function handleLogin(e) {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;

            if (email === 'bastian.zuniga@thinking.cl' && password === 'thinking2024') {
                currentUser = { id: 'uuid-bastian', email: email };
                currentUserRole = 'owner';
                sessionStorage.setItem('user', JSON.stringify(currentUser));
                sessionStorage.setItem('userRole', currentUserRole);
                showApp();
            } else {
                document.getElementById('loginError').textContent = 'Email o contraseña incorrectos';
                document.getElementById('loginError').style.display = 'block';
            }
        }

        function checkUserLogin() {
            const user = sessionStorage.getItem('user');
            if (user) {
                currentUser = JSON.parse(user);
                currentUserRole = sessionStorage.getItem('userRole') || 'viewer';
                showApp();
            }
        }

        function showApp() {
            document.getElementById('loginPage').style.display = 'none';
            document.getElementById('mainContent').classList.add('active');
            document.getElementById('userEmailDisplay').textContent = currentUser.email;
            document.getElementById('userRoleDisplay').textContent = `Rol: ${currentUserRole.toUpperCase()}`;
        }

        function handleLogout() {
            currentUser = null;
            currentUserRole = null;
            sessionStorage.removeItem('user');
            sessionStorage.removeItem('userRole');
            document.getElementById('loginPage').style.display = 'flex';
            document.getElementById('mainContent').classList.remove('active');
            resetForm();
        }

        // DOCUMENTOS
        async function loadDocuments() {
            try {
                const { data, error } = await supabaseClient
                    .from('documents')
                    .select('*')
                    .order('created_at', { ascending: false });

                if (error) throw error;
                documents = data || [];
            } catch (err) {
                console.warn('Supabase offline, usando sesión local:', err.message);
                const stored = sessionStorage.getItem('documents_local');
                documents = stored ? JSON.parse(stored) : [];
            }
            renderDocuments();
        }

        function renderDocuments() {
            const tbody = document.getElementById('documentTable');
            
            if (documents.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" style="text-align: center; padding: 30px; color: #94a3b8;">Sin documentos aún</td></tr>';
                return;
            }

            tbody.innerHTML = documents.map(doc => `
                <tr>
                    <td><strong>${escapeHtml(doc.name)}</strong></td>
                    <td><small>${doc.doc_type}</small></td>
                    <td><span class="status-badge status-${doc.status}">${doc.status}</span></td>
                    <td><small>${doc.due_date || '-'}</small></td>
                    <td>
                        ${doc.data?.link ? `<a href="${escapeHtml(doc.data.link)}" target="_blank" style="color: #3b82f6;">Ver</a>` : '-'}
                    </td>
                    <td><small>${doc.data?.created_by_email || 'Sistema'}</small></td>
                    <td>
                        <div class="actions">
                            <button class="btn-secondary btn-sm btn-icon" onclick="editDocument('${doc.id}')">✏️</button>
                            <button class="btn-danger btn-sm btn-icon" onclick="deleteDocument('${doc.id}')">🗑️</button>
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        async function handleSaveDocument(e) {
            e.preventDefault();

            const data = {
                name: document.getElementById('docName').value,
                doc_type: document.getElementById('docType').value,
                status: document.getElementById('docStatus').value,
                due_date: document.getElementById('docDueDate').value || null,
                data: {
                    link: document.getElementById('docLink').value,
                    notes: document.getElementById('docNotes').value,
                    created_by_email: currentUser.email
                }
            };

            try {
                if (editingDocId) {
                    const { error } = await supabaseClient
                        .from('documents')
                        .update({ ...data, updated_at: new Date().toISOString() })
                        .eq('id', editingDocId);
                    if (error) throw error;
                    await logAudit(editingDocId, 'updated', data);
                    showMessage('✓ Documento actualizado', 'success');
                } else {
                    const validUUID = generateUUID();
                    const { data: newDoc, error } = await supabaseClient
                        .from('documents')
                        .insert([{ ...data, created_by: validUUID }])
                        .select();
                    if (error) throw error;
                    await logAudit(newDoc[0].id, 'created', data);
                    showMessage('✓ Documento creado', 'success');
                }
            } catch (err) {
                console.warn('Guardando localmente:', err.message);
                if (!editingDocId) {
                    const validUUID = generateUUID();
                    const doc = {
                        id: validUUID,
                        ...data,
                        created_by: validUUID,
                        created_at: new Date().toISOString(),
                        updated_at: new Date().toISOString()
                    };
                    documents.push(doc);
                    sessionStorage.setItem('documents_local', JSON.stringify(documents));
                    showMessage('✓ Guardado localmente (sin Supabase)', 'info');
                } else {
                    const idx = documents.findIndex(d => d.id === editingDocId);
                    if (idx >= 0) {
                        documents[idx] = { ...documents[idx], ...data, updated_at: new Date().toISOString() };
                        sessionStorage.setItem('documents_local', JSON.stringify(documents));
                        showMessage('✓ Actualizado localmente', 'info');
                    }
                }
            }

            resetForm();
            await loadDocuments();
            await loadAudit();
        }

        function editDocument(id) {
            const doc = documents.find(d => d.id === id);
            if (!doc) return;

            editingDocId = id;
            document.getElementById('formTitle').textContent = 'Editar documento';
            document.getElementById('docName').value = doc.name;
            document.getElementById('docType').value = doc.doc_type;
            document.getElementById('docStatus').value = doc.status;
            document.getElementById('docDueDate').value = doc.due_date || '';
            document.getElementById('docLink').value = doc.data?.link || '';
            document.getElementById('docNotes').value = doc.data?.notes || '';
            document.getElementById('btnCancel').style.display = 'inline-block';

            document.querySelector('.form-section').scrollIntoView({ behavior: 'smooth' });
        }

        async function deleteDocument(id) {
            if (!confirm('¿Eliminar documento?')) return;

            try {
                const { error } = await supabaseClient.from('documents').delete().eq('id', id);
                if (error) throw error;
                await logAudit(id, 'deleted', {});
                showMessage('✓ Documento eliminado', 'success');
            } catch (err) {
                documents = documents.filter(d => d.id !== id);
                sessionStorage.setItem('documents_local', JSON.stringify(documents));
                showMessage('✓ Eliminado localmente', 'info');
            }

            await loadDocuments();
            await loadAudit();
        }

        function resetForm() {
            document.getElementById('documentForm').reset();
            editingDocId = null;
            document.getElementById('formTitle').textContent = 'Nuevo documento';
            document.getElementById('btnCancel').style.display = 'none';
        }

        // AUDITORÍA
        async function logAudit(docId, action, changes) {
            try {
                const validUUID = generateUUID();
                await supabaseClient.from('audit_log').insert([{
                    document_id: docId,
                    changed_by: validUUID,
                    action: action,
                    changes: changes
                }]);
            } catch (err) {
                console.warn('Audit local only:', err.message);
            }
        }

        async function loadAudit() {
            try {
                const { data, error } = await supabaseClient
                    .from('audit_log')
                    .select('*')
                    .order('timestamp', { ascending: false });
                if (error) throw error;
                auditLogs = data || [];
            } catch (err) {
                console.warn('Audit offline');
                auditLogs = [];
            }
            renderAudit();
        }

        function renderAudit() {
            const auditList = document.getElementById('auditList');

            if (auditLogs.length === 0) {
                auditList.innerHTML = '<div style="text-align: center; padding: 30px; color: #94a3b8;">Sin cambios registrados</div>';
                return;
            }

            auditList.innerHTML = auditLogs.map(log => {
                const date = new Date(log.timestamp);
                const timeStr = date.toLocaleString('es-CL');

                return `
                    <div class="audit-item">
                        <div class="audit-header">
                            <span class="audit-action">${log.action}</span>
                            <span class="audit-time">${timeStr}</span>
                        </div>
                        <div class="audit-user">Por: ${log.data?.email || 'Sistema'}</div>
                        <div class="audit-details">
                            ${JSON.stringify(log.changes || {}, null, 2)}
                        </div>
                    </div>
                `;
            }).join('');
        }

        // UTILS
        function switchTab(tab) {
            document.querySelectorAll('.tab-button').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById(`${tab}-tab`).classList.add('active');
        }

        function showMessage(msg, type) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${type}`;
            msgDiv.textContent = msg;
            document.querySelector('.container').insertBefore(msgDiv, document.querySelector('.header'));
            setTimeout(() => msgDiv.remove(), 3000);
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // START
        init();
    </script>
</body>
</html>
